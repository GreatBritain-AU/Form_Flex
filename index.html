<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Create an Account Form</title>
</head>
<body>
    <form>
        <div class="first-leg"><legend>CREATE AN ACCOUNT</legend></div>
        <div class="second-leg"><legend>We always keep your name and email address privet</legend></div>
        
        <div class="input-part">
            <div class="left-col">
                <input type="text" name="first_name" placeholder="First name">
                <input type="text" name="dis_name" placeholder="Display name">
                <input type="password" name="passw" placeholder="Password">
            </div>

            <div class="right-col">
                <input type="text" name="last_name" placeholder="Last name">
                <input type="email" name="email" placeholder="Email Address">
                <input type="password" name="passw_con" placeholder="Password Confirmation">
            </div>
        </div>
        
    </form>
</body>
</html>
